ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }

    application {
        modules = [ dev.wceng.sufei.server.ApplicationKt.module ]
    }
}

database {
    url = "jdbc:mysql://localhost:3306/sufei?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai"
    url = ${?DATABASE_URL}
    driver = "com.mysql.cj.jdbc.Driver"
    user = "root"
    user = ${?DATABASE_USER}
    password = "abcd1234"
    password = ${?DATABASE_PASSWORD}
    maxPoolSize = 10
    maxPoolSize = ${?DATABASE_MAX_POOL_SIZE}
}

jwt {
    secret = "sufei-jwt-secret-key-change-in-production"
    secret = ${?JWT_SECRET}
    issuer = "sufei-server"
    audience = "sufei-app"
    realm = "SuFei API"
    tokenExpirationMs = 86400000
    tokenExpirationMs = ${?JWT_EXPIRATION_MS}
}